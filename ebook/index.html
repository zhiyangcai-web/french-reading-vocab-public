<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-store">
  <title>French Reading Ebook</title>
  <style>
    :root {
      --bg: #f5f1e9;
      --paper: #fffdf7;
      --ink: #202833;
      --muted: #68737f;
      --line: #d8d0c4;
      --accent: #006d77;
      --accent-dark: #034f57;
      --gold: #fff0b8;
      --green: #dff3df;
      --pink: #ffe2ea;
      --blue: #dcecff;
      --shadow: 0 18px 45px rgba(49, 42, 34, .13);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(90deg, rgba(0, 109, 119, .06), transparent 36%),
        linear-gradient(180deg, #fbfaf6, var(--bg));
      color: var(--ink);
      font-family: Aptos, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
    }

    button, select, input, textarea {
      font: inherit;
    }

    button, select, input {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
      color: var(--ink);
      touch-action: manipulation;
    }

    button {
      padding: 8px 12px;
      font-weight: 800;
      cursor: pointer;
    }

    button:disabled {
      opacity: .55;
      cursor: not-allowed;
    }

    select, input {
      padding: 7px 10px;
      max-width: 100%;
    }

    .app {
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: 16px;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: end;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .sub {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
      margin-top: 5px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: auto auto minmax(72px, 92px) auto auto auto auto auto;
      gap: 8px;
      align-items: center;
      margin-bottom: 12px;
    }

    .toolbar .primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .toolbar .active {
      border-color: var(--accent);
      color: var(--accent-dark);
      background: #e1f2f1;
    }

    .swatches {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .swatch {
      width: 36px;
      min-height: 36px;
      padding: 0;
      border-radius: 999px;
    }

    .swatch[data-color="yellow"] { background: var(--gold); }
    .swatch[data-color="green"] { background: var(--green); }
    .swatch[data-color="pink"] { background: var(--pink); }
    .swatch[data-color="blue"] { background: var(--blue); }

    .swatch.active {
      outline: 3px solid rgba(0, 109, 119, .35);
      border-color: var(--accent);
    }

    .layout {
      display: grid;
      grid-template-columns: 220px minmax(0, 1fr) 260px;
      gap: 14px;
      align-items: start;
    }

    .panel, .reader {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 10px;
      box-shadow: 0 12px 30px rgba(49, 42, 34, .08);
    }

    .panel {
      padding: 12px;
      display: grid;
      gap: 10px;
    }

    .page-list {
      display: grid;
      gap: 6px;
    }

    .page-tab {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      text-align: left;
      min-height: 38px;
      width: 100%;
    }

    .page-tab.active {
      background: #e1f2f1;
      border-color: var(--accent);
      color: var(--accent-dark);
    }

    .pill {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      border-radius: 999px;
      background: #e8f3f2;
      color: var(--accent-dark);
      font-weight: 850;
      padding: 5px 9px;
      line-height: 1.2;
      white-space: nowrap;
    }

    .reader {
      min-height: 72vh;
      padding: clamp(20px, 4vw, 44px);
    }

    .reader-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: baseline;
      border-bottom: 1px solid var(--line);
      padding-bottom: 12px;
      margin-bottom: 20px;
    }

    .reader-title {
      margin: 0;
      font-size: 20px;
      line-height: 1.3;
      letter-spacing: 0;
    }

    .text-page {
      font-family: Georgia, "Times New Roman", serif;
      font-size: var(--reader-size, 20px);
      line-height: 1.78;
      color: #1e252f;
    }

    .text-page p {
      margin: 0 0 1em;
    }

    mark.reader-mark {
      border-radius: 4px;
      padding: 0 .08em;
      color: inherit;
    }

    mark.yellow { background: var(--gold); }
    mark.green { background: var(--green); }
    mark.pink { background: var(--pink); }
    mark.blue { background: var(--blue); }

    .side-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    h2 {
      margin: 0;
      font-size: 17px;
      line-height: 1.3;
      letter-spacing: 0;
    }

    .mark-list {
      display: grid;
      gap: 8px;
      max-height: 280px;
      overflow: auto;
    }

    .mark-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      display: grid;
      gap: 7px;
      background: #fffefa;
    }

    .mark-text {
      font-size: 14px;
      line-height: 1.45;
      color: var(--ink);
    }

    .mark-actions {
      display: flex;
      justify-content: flex-end;
    }

    .small {
      min-height: 32px;
      padding: 5px 8px;
      font-size: 13px;
    }

    textarea {
      width: 100%;
      min-height: 130px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fffefa;
      color: var(--ink);
      line-height: 1.5;
    }

    .empty {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .page-list {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .toolbar {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }

    @media (max-width: 560px) {
      .app {
        padding: 12px;
      }

      .topbar {
        grid-template-columns: 1fr;
      }

      .toolbar {
        grid-template-columns: 1fr 1fr;
      }

      .toolbar input, .toolbar select {
        width: 100%;
      }

      .swatches {
        grid-column: span 2;
      }

      .page-list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .reader {
        padding: 18px;
        min-height: 60vh;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1>French Reading Ebook</h1>
        <div id="meta" class="sub">Loading...</div>
      </div>
      <span id="progress" class="pill">0 / 0</span>
    </header>

    <section class="toolbar" aria-label="Reader controls">
      <button id="prevBtn" type="button">←</button>
      <button id="nextBtn" type="button">→</button>
      <input id="jumpInput" type="number" min="1" inputmode="numeric" aria-label="Page number" placeholder="页码">
      <button id="jumpBtn" type="button">跳转</button>
      <button id="bookmarkBtn" type="button">星标</button>
      <button id="sizeDownBtn" type="button">A-</button>
      <button id="sizeUpBtn" type="button">A+</button>
      <button id="highlightBtn" class="primary" type="button">高亮选中</button>
      <div class="swatches" aria-label="Highlight color">
        <button class="swatch active" data-color="yellow" type="button" aria-label="Yellow"></button>
        <button class="swatch" data-color="green" type="button" aria-label="Green"></button>
        <button class="swatch" data-color="pink" type="button" aria-label="Pink"></button>
        <button class="swatch" data-color="blue" type="button" aria-label="Blue"></button>
      </div>
    </section>

    <section class="layout">
      <aside class="panel">
        <div class="side-head">
          <h2>Pages</h2>
          <span id="bookmarkCount" class="pill">0</span>
        </div>
        <div id="pageList" class="page-list"></div>
      </aside>

      <article class="reader">
        <div class="reader-head">
          <h2 id="pageTitle" class="reader-title">Page</h2>
          <span id="pageBadge" class="pill"></span>
        </div>
        <div id="textPage" class="text-page"></div>
      </article>

      <aside class="panel">
        <div class="side-head">
          <h2>Highlights</h2>
          <span id="markCount" class="pill">0</span>
        </div>
        <div id="markList" class="mark-list"></div>
        <div class="side-head">
          <h2>Notes</h2>
          <span id="notePage" class="pill"></span>
        </div>
        <textarea id="notes" aria-label="Page notes"></textarea>
      </aside>
    </section>
  </main>

  <script>
    const storage = {
      state: "reading_ebook_state_v1"
    };

    let book = null;
    let pages = [];
    let pageIndex = 0;
    let selectedColor = "yellow";
    let state = readState();

    const els = {
      meta: document.getElementById("meta"),
      progress: document.getElementById("progress"),
      pageList: document.getElementById("pageList"),
      pageTitle: document.getElementById("pageTitle"),
      pageBadge: document.getElementById("pageBadge"),
      textPage: document.getElementById("textPage"),
      jumpInput: document.getElementById("jumpInput"),
      jumpBtn: document.getElementById("jumpBtn"),
      prevBtn: document.getElementById("prevBtn"),
      nextBtn: document.getElementById("nextBtn"),
      bookmarkBtn: document.getElementById("bookmarkBtn"),
      bookmarkCount: document.getElementById("bookmarkCount"),
      highlightBtn: document.getElementById("highlightBtn"),
      sizeDownBtn: document.getElementById("sizeDownBtn"),
      sizeUpBtn: document.getElementById("sizeUpBtn"),
      markList: document.getElementById("markList"),
      markCount: document.getElementById("markCount"),
      notes: document.getElementById("notes"),
      notePage: document.getElementById("notePage")
    };

    function readState() {
      try {
        const raw = localStorage.getItem(storage.state);
        const parsed = raw ? JSON.parse(raw) : {};
        return {
          pageId: parsed.pageId || "",
          size: Number(parsed.size || 20),
          bookmarks: parsed.bookmarks && typeof parsed.bookmarks === "object" ? parsed.bookmarks : {},
          highlights: parsed.highlights && typeof parsed.highlights === "object" ? parsed.highlights : {},
          notes: parsed.notes && typeof parsed.notes === "object" ? parsed.notes : {}
        };
      } catch (error) {
        return { pageId: "", size: 20, bookmarks: {}, highlights: {}, notes: {} };
      }
    }

    function saveState() {
      localStorage.setItem(storage.state, JSON.stringify(state));
    }

    function currentPage() {
      return pages[pageIndex] || null;
    }

    function pageMarks(pageId) {
      return Array.isArray(state.highlights[pageId]) ? state.highlights[pageId] : [];
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function rangesForText(text, marks) {
      const ranges = [];
      for (const mark of marks) {
        const needle = String(mark.text || "").trim();
        if (!needle) continue;
        let start = 0;
        while (start < text.length) {
          const index = text.indexOf(needle, start);
          if (index < 0) break;
          const end = index + needle.length;
          if (!ranges.some(range => index < range.end && end > range.start)) {
            ranges.push({ start: index, end, color: mark.color || "yellow" });
          }
          start = end;
        }
      }
      return ranges.sort((a, b) => a.start - b.start);
    }

    function markedHtml(text, marks) {
      const ranges = rangesForText(text, marks);
      if (!ranges.length) return escapeHtml(text);
      let html = "";
      let cursor = 0;
      for (const range of ranges) {
        html += escapeHtml(text.slice(cursor, range.start));
        html += `<mark class="reader-mark ${range.color}">${escapeHtml(text.slice(range.start, range.end))}</mark>`;
        cursor = range.end;
      }
      html += escapeHtml(text.slice(cursor));
      return html;
    }

    function renderPageList() {
      els.pageList.replaceChildren();
      for (const [index, page] of pages.entries()) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `page-tab${index === pageIndex ? " active" : ""}`;
        button.innerHTML = `<span>${escapeHtml(page.label)}</span><span>${state.bookmarks[page.id] ? "★" : ""}</span>`;
        button.addEventListener("click", () => setPage(index));
        els.pageList.appendChild(button);
      }
      els.bookmarkCount.textContent = String(Object.values(state.bookmarks).filter(Boolean).length);
    }

    function renderMarks(page) {
      const marks = pageMarks(page.id);
      els.markCount.textContent = String(marks.length);
      els.markList.replaceChildren();
      if (!marks.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "No highlights";
        els.markList.appendChild(empty);
        return;
      }
      for (const mark of marks) {
        const item = document.createElement("div");
        item.className = "mark-item";
        const text = document.createElement("div");
        text.className = "mark-text";
        text.textContent = mark.text;
        const actions = document.createElement("div");
        actions.className = "mark-actions";
        const del = document.createElement("button");
        del.type = "button";
        del.className = "small";
        del.textContent = "删除";
        del.addEventListener("click", () => {
          state.highlights[page.id] = pageMarks(page.id).filter(item => item.id !== mark.id);
          saveState();
          render();
        });
        actions.appendChild(del);
        item.append(text, actions);
        els.markList.appendChild(item);
      }
    }

    function render() {
      const page = currentPage();
      if (!page) return;
      state.pageId = page.id;
      saveState();
      document.documentElement.style.setProperty("--reader-size", `${state.size}px`);
      els.meta.textContent = `${book.title} · ${pages.length} pages · ${book.updated}`;
      els.progress.textContent = `${pageIndex + 1} / ${pages.length}`;
      els.pageTitle.textContent = page.label;
      els.pageBadge.textContent = state.bookmarks[page.id] ? "★" : page.number;
      els.jumpInput.value = "";
      els.jumpInput.max = String(pages.length);
      els.bookmarkBtn.textContent = state.bookmarks[page.id] ? "取消星标" : "星标";
      els.bookmarkBtn.classList.toggle("active", !!state.bookmarks[page.id]);
      els.notePage.textContent = page.label;
      els.notes.value = state.notes[page.id] || "";

      const marks = pageMarks(page.id);
      els.textPage.replaceChildren();
      for (const paragraph of page.paragraphs) {
        const p = document.createElement("p");
        p.innerHTML = markedHtml(paragraph, marks);
        els.textPage.appendChild(p);
      }
      renderPageList();
      renderMarks(page);
    }

    function setPage(nextIndex) {
      pageIndex = Math.min(Math.max(nextIndex, 0), pages.length - 1);
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function jump() {
      const value = Number(els.jumpInput.value);
      if (!Number.isFinite(value)) return;
      const index = pages.findIndex(page => Number(page.number) === value);
      setPage(index >= 0 ? index : value - 1);
    }

    function addHighlight() {
      const page = currentPage();
      if (!page) return;
      const selection = window.getSelection();
      const text = selection ? selection.toString().replace(/\s+/g, " ").trim() : "";
      if (!text) return;
      const pageText = page.paragraphs.join(" ");
      if (!pageText.includes(text)) return;
      const mark = {
        id: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
        text,
        color: selectedColor
      };
      state.highlights[page.id] = [...pageMarks(page.id), mark];
      selection.removeAllRanges();
      saveState();
      render();
    }

    function changeSize(delta) {
      state.size = Math.min(Math.max(state.size + delta, 16), 28);
      saveState();
      render();
    }

    function initEvents() {
      els.prevBtn.addEventListener("click", () => setPage(pageIndex - 1));
      els.nextBtn.addEventListener("click", () => setPage(pageIndex + 1));
      els.jumpBtn.addEventListener("click", jump);
      els.jumpInput.addEventListener("keydown", event => {
        if (event.key === "Enter") jump();
      });
      els.bookmarkBtn.addEventListener("click", () => {
        const page = currentPage();
        if (!page) return;
        state.bookmarks[page.id] = !state.bookmarks[page.id];
        saveState();
        render();
      });
      els.highlightBtn.addEventListener("click", addHighlight);
      els.sizeDownBtn.addEventListener("click", () => changeSize(-1));
      els.sizeUpBtn.addEventListener("click", () => changeSize(1));
      els.notes.addEventListener("input", () => {
        const page = currentPage();
        if (!page) return;
        state.notes[page.id] = els.notes.value;
        saveState();
      });
      for (const button of document.querySelectorAll(".swatch")) {
        button.addEventListener("click", () => {
          selectedColor = button.dataset.color || "yellow";
          document.querySelectorAll(".swatch").forEach(item => item.classList.toggle("active", item === button));
        });
      }
      window.addEventListener("keydown", event => {
        const interactive = ["INPUT", "TEXTAREA", "BUTTON", "SELECT"].includes(event.target.tagName);
        if (interactive) return;
        if (event.key === "ArrowLeft") setPage(pageIndex - 1);
        if (event.key === "ArrowRight") setPage(pageIndex + 1);
      });
    }

    async function loadBook() {
      const response = await fetch(`book.json?v=${Date.now()}`, { cache: "no-store" });
      if (!response.ok) throw new Error(`Could not load book.json: ${response.status}`);
      book = await response.json();
      pages = Array.isArray(book.pages) ? book.pages : [];
      const savedIndex = pages.findIndex(page => page.id === state.pageId);
      pageIndex = savedIndex >= 0 ? savedIndex : 0;
      initEvents();
      render();
    }

    loadBook().catch(error => {
      els.meta.textContent = "Failed to load book.json";
      console.error(error);
    });
  </script>
</body>
</html>
